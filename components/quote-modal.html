<div class="modal-overlay" id="quote-modal">
  <div class="modal glass-strong">
    <button class="modal-close" id="modal-close" aria-label="Close modal">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <div class="modal-header">
      <h2 class="text-2xl font-semibold">Get Your Free Estimate</h2>
      <p class="text-sm" style="color: var(--color-gray-400);">We'll get back to you within 24 hours</p>
    </div>

    <form class="modal-form" id="quote-modal-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="modal-name">Name</label>
          <input class="form-input" type="text" id="modal-name" name="name" required placeholder="Your name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="modal-email">Email</label>
          <input class="form-input" type="email" id="modal-email" name="email" required placeholder="your@email.com" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="modal-phone">Phone</label>
          <input class="form-input" type="tel" id="modal-phone" name="phone" required placeholder="(867) 555-0123" />
        </div>
        <div class="form-group">
          <label class="form-label" for="modal-service">Service</label>
          <select class="form-select" id="modal-service" name="service" required>
            <option value="">Select a service</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="modal-message">Project Details</label>
        <textarea class="form-textarea" id="modal-message" name="message" rows="3" placeholder="Tell us about your project..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-full">Submit Request</button>
    </form>
  </div>
</div>
